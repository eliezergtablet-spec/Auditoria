<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Auditoría Pro - Conteo por Pisos y Unidades</title>
    
    <style>
        :root { 
            --primary: #2563eb; 
            --success: #059669; 
            --danger: #dc2626; 
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
            --slate: #94a3b8;
            --accent: #f59e0b;
        }
        
        body { 
            font-family: system-ui, -apple-system, sans-serif; 
            background: var(--bg); color: var(--text);
            margin: 0; padding: 10px; padding-bottom: 240px;
        }

        .global-header {
            background: linear-gradient(135deg, #1e40af, #1e293b);
            border-radius: 20px; padding: 15px; margin-bottom: 15px;
            border: 1px solid #3b82f6; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .stats-row { display: flex; justify-content: space-between; align-items: center; }
        .stats-row b { font-size: 1.8rem; }
        .stats-row span { font-size: 0.65rem; font-weight: bold; color: var(--slate); display: block; text-transform: uppercase; }

        .route-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; margin-bottom: 15px; }
        .route-btn {
            background: var(--card); border: 1px solid #334155; color: var(--slate);
            padding: 10px 0; border-radius: 10px; font-weight: 800; font-size: 0.8rem; cursor: pointer;
        }
        .route-btn.active { background: var(--primary); color: white; border-color: #60a5fa; }
        .route-btn.has-data { border-color: var(--accent); color: var(--accent); border-style: dashed; }

        .main-card { background: var(--card); border-radius: 20px; padding: 15px; border: 1px solid #334155; }
        .timer-box { font-family: monospace; color: var(--accent); background: #0f172a; padding: 4px 10px; border-radius: 6px; margin-bottom: 10px; display: inline-block; font-size: 0.85rem; border: 1px solid #475569; }

        .input-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        label { font-size: 0.65rem; color: var(--slate); font-weight: bold; margin-bottom: 3px; display: block; }
        input[type="text"], input[type="number"] { width: 100%; padding: 10px; background: #0f172a; border: 1px solid #475569; color: white; border-radius: 10px; box-sizing: border-box; font-weight: bold; outline: none; }

        .palette-container {
            background: #111827; border-radius: 15px; padding: 12px; margin-bottom: 15px; border: 1px solid #334155;
        }
        .palette-header { display: flex; justify-content: space-between; margin-bottom: 10px; border-bottom: 1px solid #334155; padding-bottom: 5px; }
        .palette-header b { color: var(--primary); font-size: 0.9rem; }
        
        .layer-item {
            background: #1e293b; padding: 12px; border-radius: 12px; margin-bottom: 10px; border: 1px solid #334155;
        }
        .layer-controls-row { display: grid; grid-template-columns: 1fr auto auto; gap: 8px; margin-bottom: 5px; align-items: center; }
        
        select { background: #0f172a; color: white; border: 1px solid #475569; padding: 8px; border-radius: 8px; font-size: 0.8rem; width: 100%; }
        
        /* Visualización de la suma por pisos */
        .floor-track {
            background: rgba(0,0,0,0.3); padding: 8px 10px; border-radius: 6px; 
            font-weight: bold; font-size: 0.85rem; color: var(--text);
            margin-bottom: 8px; display: flex; justify-content: space-between;
            border-left: 4px solid var(--accent);
        }
        .floor-track span { color: var(--accent); }

        .qty-controls { display: flex; gap: 5px; justify-content: space-between; margin-top: 8px; }
        .btn-qty { flex: 1; padding: 10px 5px; border: none; border-radius: 8px; font-weight: bold; color: white; font-size: 0.7rem; cursor: pointer; transition: 0.1s; }
        .btn-qty:active { transform: scale(0.95); opacity: 0.8; }
        .btn-unit { background: #475569; }
        .btn-floor { background: var(--primary); }
        .layer-total-display { font-size: 1.1rem; font-weight: 900; color: var(--accent); background: #0f172a; padding: 8px; border-radius: 8px; text-align: center; min-width: 50px; }

        .footer-fixed {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(10px);
            padding: 15px; border-top: 1px solid #334155; z-index: 100;
        }
        .status-summary { display: flex; justify-content: space-between; margin-bottom: 10px; background: #0f172a; padding: 10px; border-radius: 12px; border: 1px solid #334155; }
        .status-summary div { text-align: center; flex: 1; }
        .status-summary b { display: block; font-size: 1.2rem; }
        
        .action-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-main { padding: 15px; border-radius: 12px; border: none; font-weight: bold; color: white; cursor: pointer; font-size: 0.9rem; }
        .btn-wa { background: #25d366; }
        .btn-save { background: var(--success); }
    </style>
</head>
<body>

    <div class="global-header">
        <div class="stats-row">
            <div><span>SUMA TOTAL CARGA</span><b id="gTotal">0</b></div>
            <div style="text-align: right;"><span>RUTAS</span><b id="gActive">0/20</b></div>
        </div>
    </div>

    <div class="route-grid" id="routeGrid"></div>

    <div class="main-card">
        <div class="timer-box">⏱ <span id="timer">00:00</span></div>
        <div class="input-group">
            <div><label>ID RUTA / MOV</label><input type="text" id="rName" oninput="sync()"></div>
            <div><label>TOTAL HOJA</label><input type="number" id="rSheet" oninput="sync()"></div>
        </div>

        <div id="palettesList"></div>
        
        <button onclick="addPalette()" style="width:100%; padding:15px; background:var(--primary); color:white; border:none; border-radius:12px; font-weight:bold; margin-top:10px;">
            + NUEVA PALETA
        </button>
    </div>

    <div class="footer-fixed">
        <div class="status-summary">
            <div><span>REAL</span><b id="vReal">0</b></div>
            <div><span>DIFERENCIA</span><b id="vDiff">0</b></div>
        </div>
        <div class="action-btns">
            <button class="btn-main btn-wa" onclick="shareWhatsApp()">💬 REPORTE WA</button>
            <button class="btn-main btn-save" onclick="archive()">💾 ARCHIVAR</button>
        </div>
    </div>

<script>
    let rIdx = 0;
    const products = [
        { n: "Ref. 350ml Botella", v: 8 },
        { n: "Ref. 355ml Lata", v: 18 },
        { n: "Ref. 355ml Pet", v: 20 },
        { n: "Ref. 1 Litro", v: 25 },
        { n: "Ref. 1.5 Litros", v: 21 },
        { n: "Ref. 2 Litros", v: 18 },
        { n: "Nevada Saborizada", v: 19 },
        { n: "Nevada 355ml Pet", v: 20 },
        { n: "Nevada 600ml Pet", v: 15 },
        { n: "Nevada 1.5L / 5L", v: 25 },
        { n: "Fresh 250ml", v: 28 },
        { n: "Fresh 500ml", v: 20 },
        { n: "Fresh 1.5L", v: 21 }
    ];

    let rutas = JSON.parse(localStorage.getItem('auditoria_v6')) || Array.from({ length: 20 }, () => ({
        name: "", sheet: 0, time: 0, palettes: [{ layers: [{ prodIdx: 0, qty: 0 }] }]
    }));

    function init() {
        const grid = document.getElementById('routeGrid');
        for(let i=0; i<20; i++) {
            const b = document.createElement('button');
            b.className = 'route-btn'; b.innerText = i+1; b.id = 'rb'+i;
            b.onclick = () => selectRoute(i);
            grid.appendChild(b);
        }
        selectRoute(0);
        setInterval(() => {
            if(rutas[rIdx].name !== "") {
                rutas[rIdx].time++;
                updateTimer();
                localStorage.setItem('auditoria_v6', JSON.stringify(rutas));
            }
        }, 1000);
    }

    function selectRoute(i) {
        rIdx = i;
        document.getElementById('rName').value = rutas[rIdx].name;
        document.getElementById('rSheet').value = rutas[rIdx].sheet || "";
        updateTimer();
        render();
    }

    function updateTimer() {
        const s = rutas[rIdx].time;
        document.getElementById('timer').innerText = `${Math.floor(s/60).toString().padStart(2,'0')}:${(s%60).toString().padStart(2,'0')}`;
    }

    function addPalette() {
        rutas[rIdx].palettes.push({ layers: [{ prodIdx: 0, qty: 0 }] });
        render();
    }

    function addLayer(pi) {
        rutas[rIdx].palettes[pi].layers.push({ prodIdx: 0, qty: 0 });
        render();
    }

    function removeLayer(pi, li) {
        rutas[rIdx].palettes[pi].layers.splice(li, 1);
        if(rutas[rIdx].palettes[pi].layers.length === 0) rutas[rIdx].palettes.splice(pi, 1);
        render();
    }

    function updateQty(pi, li, n) {
        const layer = rutas[rIdx].palettes[pi].layers[li];
        layer.qty += n;
        if(layer.qty < 0) layer.qty = 0;
        render();
    }

    function clearHistory(pi, li) {
        rutas[rIdx].palettes[pi].layers[li].qty = 0;
        render();
    }

    function setProduct(pi, li, idx) {
        rutas[rIdx].palettes[pi].layers[li].prodIdx = parseInt(idx);
        render();
    }

    function sync() {
        rutas[rIdx].name = document.getElementById('rName').value;
        rutas[rIdx].sheet = parseInt(document.getElementById('rSheet').value) || 0;
        localStorage.setItem('auditoria_v6', JSON.stringify(rutas));
        render();
    }

    function render() {
        let gTotal = 0; let active = 0;
        rutas.forEach((r, i) => {
            let rSum = 0;
            r.palettes.forEach(p => p.layers.forEach(l => rSum += l.qty));
            gTotal += rSum;
            if(rSum > 0 || r.name !== "") active++;
            document.getElementById('rb'+i).className = `route-btn ${i === rIdx ? 'active' : (rSum > 0 ? 'has-data' : '')}`;
        });

        document.getElementById('gTotal').innerText = gTotal;
        document.getElementById('gActive').innerText = active + "/20";

        const list = document.getElementById('palettesList');
        list.innerHTML = "";
        
        rutas[rIdx].palettes.forEach((p, pi) => {
            const pDiv = document.createElement('div');
            pDiv.className = 'palette-container';
            let pSum = 0;
            p.layers.forEach(l => pSum += l.qty);

            let layersHtml = p.layers.map((l, li) => {
                const prod = products[l.prodIdx];
                const floors = Math.floor(l.qty / prod.v);
                const units = l.qty % prod.v;
                
                return `
                <div class="layer-item">
                    <div class="layer-controls-row">
                        <select onchange="setProduct(${pi}, ${li}, this.value)">
                            ${products.map((pr, idx) => `<option value="${idx}" ${l.prodIdx == idx ? 'selected' : ''}>${pr.n} (${pr.v})</option>`).join('')}
                        </select>
                        <div class="layer-total-display">${l.qty}</div>
                        <button onclick="clearHistory(${pi}, ${li})" style="background:none; border:none; color:var(--slate); font-size:1rem; cursor:pointer;">🔄</button>
                    </div>
                    
                    <div class="floor-track">
                        <div>CONTEO:</div>
                        <div><span>${floors}</span> PISOS + <span>${units}</span> UNI</div>
                    </div>
                    
                    <div class="qty-controls">
                        <button class="btn-qty btn-unit" onclick="updateQty(${pi}, ${li}, -1)">-1</button>
                        <button class="btn-qty btn-unit" onclick="updateQty(${pi}, ${li}, 1)">+1</button>
                        <button class="btn-qty btn-floor" onclick="updateQty(${pi}, ${li}, -${prod.v})">-${prod.v}</button>
                        <button class="btn-qty btn-floor" onclick="updateQty(${pi}, ${li}, ${prod.v})">+${prod.v}</button>
                    </div>
                </div>
                `;
            }).join('');

            pDiv.innerHTML = `
                <div class="palette-header"><b>PALETA ${pi+1}</b> <span>Total: ${pSum}</span></div>
                ${layersHtml}
                <button onclick="addLayer(${pi})" style="width:100%; background:none; border:1px dashed var(--slate); color:var(--slate); border-radius:10px; padding:10px; font-size:0.75rem; margin-top:5px; font-weight:bold;">+ AGREGAR OTRO PRODUCTO</button>
            `;
            list.appendChild(pDiv);
        });

        let rReal = 0;
        rutas[rIdx].palettes.forEach(p => p.layers.forEach(l => rReal += l.qty));
        const diff = rReal - rutas[rIdx].sheet;
        document.getElementById('vReal').innerText = rReal;
        document.getElementById('vDiff').innerText = (diff > 0 ? "+" : "") + diff;
        
        const summary = document.querySelector('.status-summary');
        summary.style.borderColor = diff === 0 && rReal > 0 ? "var(--success)" : (diff !== 0 ? "var(--danger)" : "#334155");
        
        localStorage.setItem('auditoria_v6', JSON.stringify(rutas));
    }

    function shareWhatsApp() {
        let r = rutas[rIdx];
        if(!r.name) return alert("Ingrese ID de Ruta.");
        let rReal = 0;
        r.palettes.forEach(p => p.layers.forEach(l => rReal += l.qty));
        let txt = `*🚀 REPORTE DE AUDITORÍA DE CARGA*\n*Ruta:* ${r.name}\n*Total Real:* ${rReal}\n*Hoja:* ${r.sheet}\n*Dif:* ${rReal - r.sheet}\n*Tiempo:* ${document.getElementById('timer').innerText}\n--------------------------\n`;
        r.palettes.forEach((p, i) => {
            let pSum = 0; 
            txt += `*Paleta ${i+1}:*\n`;
            p.layers.forEach(l => {
                const prod = products[l.prodIdx];
                const floors = Math.floor(l.qty / prod.v);
                const units = l.qty % prod.v;
                txt += `- ${prod.n}: ${l.qty} (${floors}P + ${units}U)\n`;
                pSum += l.qty;
            });
            txt += `_Subtotal Paleta: ${pSum}_ \n\n`;
        });
        window.open(`https://wa.me/?text=${encodeURIComponent(txt)}`);
    }

    function archive() {
        alert("Ruta auditada y guardada con éxito.");
    }

    init();
</script>
</body>
</html>
